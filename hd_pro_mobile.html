<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000000"/>
<title>HD Pro Prototype</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}

/* Progress bar */
#prog-bar{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.1);z-index:1000;pointer-events:none}
#prog-fill{height:100%;background:#F96302;transition:width 0.35s ease;width:0%}

/* Tap zones */
#tap-left{position:fixed;left:0;top:0;width:30%;height:100%;z-index:900;cursor:pointer}
#tap-right{position:fixed;right:0;top:0;width:40%;height:100%;z-index:900;cursor:pointer}

/* Screen container */
#sw{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;transform:translateX(100%);transition:opacity .3s ease,transform .3s cubic-bezier(.25,.46,.45,.94);pointer-events:none}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all}
.screen.exit{opacity:0;transform:translateX(-25%)}

/* DI container */
#diWrap{position:fixed;top:9px;left:50%;transform:translateX(-50%);z-index:950;display:none;flex-direction:column;align-items:center}
.di-pill{background:#000;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
.di-pill.closed{width:210px;height:34px;border-radius:17px}
.di-pill.open{width:260px;height:72px;border-radius:26px}
.di-closed-inner{display:flex;align-items:center;height:100%;padding:0 5px;opacity:1;transition:opacity .15s}
.di-closed-inner.fade{opacity:0}
.di-logo-circle{width:26px;height:26px;border-radius:50%;background:#F96302;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;position:relative}
.di-camera{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#111;border:1.5px solid rgba(255,255,255,.07);z-index:1}
.di-right{margin-left:auto;display:flex;align-items:center;gap:4px;padding-right:5px;flex-shrink:0}
.di-eta-n{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1}
.di-eta-u{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);line-height:1}
.di-open-inner{position:absolute;inset:0;padding:10px 14px;display:flex;align-items:center;gap:12px;opacity:0;transition:opacity .2s .15s}
.di-open-inner.show{opacity:1}
.di-app-icon{width:40px;height:40px;background:#F96302;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.di-open-text{flex:1;min-width:0}
.di-open-title{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-open-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.di-open-eta{text-align:right;flex-shrink:0}
.di-open-num{font-size:22px;font-weight:300;color:#fff;line-height:1}
.di-open-lbl{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em}
.di-hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px;white-space:nowrap;pointer-events:none;transition:opacity .3s;text-align:center}

/* Variables */
:root{
  --orange:#F96302;--orange-light:#FFF3EC;--orange-mid:#FECFAA;--orange-dark:#C45000;
  --black:#1C1C1E;--gray1:#F2F2F7;--gray2:#E5E5EA;--gray3:#C7C7CC;--gray4:#8E8E93;
  --green:#34C759;--green-bg:#E8F8EE;--green-text:#1A7A3C;--red:#FF3B30;--blue:#007AFF;
}

/* Status bar */
.sbar{height:50px;display:flex;align-items:flex-end;padding:0 20px 8px;flex-shrink:0;background:inherit}
.sbar-time{font-size:16px;font-weight:700;flex:1}
.sbar-icons{display:flex;gap:5px;align-items:center}

/* Nav */
.nbar{padding:9px 16px 11px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--orange)}
.nbar-back{font-size:13px;color:rgba(255,255,255,.8)}
.nbar-title{font-size:15px;font-weight:700;color:#fff}
.nbar-badge{margin-left:auto;background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}

.content{padding:14px}
.card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-p{padding:14px}
.slbl{font-size:10px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 5px}
.otitle{font-size:17px;font-weight:700;color:var(--black)}
.osub{font-size:12px;color:var(--gray4);margin-top:3px}
.irow{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--gray1)}
.irow:last-child{border-bottom:none}
.iicon{width:44px;height:44px;border-radius:10px;background:var(--gray1);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.iname{font-size:13px;font-weight:600;color:var(--black)}
.isub{font-size:11px;color:var(--gray4);margin-top:2px}
.delegate-box{border:2px solid var(--orange);border-radius:14px;overflow:hidden;background:var(--orange-light);margin-bottom:10px}
.delegate-lbl{font-size:11px;font-weight:700;color:var(--orange-dark);padding:10px 13px 5px;display:flex;align-items:center;gap:6px}
.mfield{margin:0 13px 8px;background:#fff;border:1px solid var(--gray2);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:500;color:var(--black)}
.srow{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray1);color:var(--gray4)}
.srow:last-child{border-bottom:none}
.srow span:last-child{color:var(--black);font-weight:600}
.cta-btn{display:block;width:100%;background:var(--orange);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;text-align:center;cursor:pointer;margin-top:11px;position:relative;z-index:950}

/* SMS */
.sms-hdr{padding:11px 15px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:11px;background:#fff}
.sms-av{width:40px;height:40px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.sms-name{font-size:14px;font-weight:700;color:var(--black)}
.sms-ver{font-size:11px;color:var(--blue);margin-top:1px}
.bubble{background:#fff;border-radius:18px 18px 18px 4px;padding:12px 13px;font-size:14px;color:var(--black);line-height:1.55;border:1px solid var(--gray2);max-width:90%;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.blink{display:block;margin-top:12px;background:var(--orange);color:#fff;border-radius:10px;padding:11px 12px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;position:relative;z-index:950}

/* Consent */
.consent-sheet{background:#fff;border-radius:22px 22px 0 0;padding:0 20px 40px;width:100%}
.shandle{width:38px;height:4px;background:var(--gray2);border-radius:2px;margin:12px auto 18px}
.cicon{width:56px;height:56px;background:var(--orange-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
.ctitle{font-size:20px;font-weight:800;color:var(--black);text-align:center;margin-bottom:6px}
.cbody{font-size:14px;color:var(--gray4);text-align:center;line-height:1.5;margin-bottom:18px}
.cdetail{background:var(--gray1);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.crow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--gray2)}
.crow:last-child{border-bottom:none}
.crow span:first-child{color:var(--gray4)}
.crow span:last-child{color:var(--black);font-weight:700}
.cbtns{display:flex;gap:10px}
.yes-btn{flex:2;background:var(--orange);color:#fff;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;position:relative;z-index:950}
.no-btn{flex:1;background:var(--gray1);color:#6C6C70;border:none;border-radius:13px;padding:14px;font-size:13px;font-weight:600;cursor:pointer;position:relative;z-index:950}

/* iOS popup */
.ios-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:960;align-items:center;justify-content:center;padding:24px}
.ios-popup{background:rgba(242,242,247,.97);border-radius:14px;overflow:hidden;width:100%;max-width:280px}
.ios-popup-body{padding:20px 16px 16px;text-align:center}
.ios-app-icon{width:52px;height:52px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.ios-title{font-size:16px;font-weight:700;color:#000;line-height:1.35;margin-bottom:8px}
.ios-msg{font-size:13px;color:#3C3C43;line-height:1.5}
.ios-divider{height:.5px;background:rgba(60,60,67,.29)}
.ios-btns{display:flex}
.ios-btn{flex:1;padding:13px 8px;font-size:17px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:400;position:relative;z-index:970}
.ios-btn.bold{font-weight:600}
.ios-btn-div{width:.5px;background:rgba(60,60,67,.29);flex-shrink:0}

/* Lock screen */
.lockscreen{background:#000;min-height:100%;display:flex;flex-direction:column;color:#fff}
.ls-sbar{display:flex;align-items:center;padding:14px 20px 6px;flex-shrink:0}
.ls-time-sm{font-size:16px;font-weight:700;color:#fff;flex:1}
.ls-clock{font-size:72px;font-weight:200;text-align:center;letter-spacing:-3px;line-height:1;margin-top:8px}
.ls-date{font-size:14px;text-align:center;color:rgba(255,255,255,.55);margin-top:4px;margin-bottom:22px;font-weight:500}
.ls-notif-card{margin:0 14px 10px;background:rgba(28,28,30,.9);border-radius:16px;overflow:hidden;border:.5px solid rgba(255,255,255,.1)}
.ls-notif-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.ls-notif-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.ls-notif-app{font-size:12px;font-weight:700;color:#fff}
.ls-notif-time{font-size:11px;color:rgba(255,255,255,.38)}
.ls-notif-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.ls-notif-body{font-size:12px;color:rgba(255,255,255,.6);line-height:1.45}
.ls-notif-actions{border-top:.5px solid rgba(255,255,255,.08);display:flex}
.ls-notif-action{flex:1;padding:10px;font-size:13px;font-weight:600;color:#0A84FF;text-align:center;cursor:pointer;position:relative;z-index:950}
.ls-notif-action+.ls-notif-action{border-left:.5px solid rgba(255,255,255,.08)}
.ai-badge-row{display:flex;align-items:center;gap:6px;margin:0 14px 7px;padding:0 2px}
.ai-badge-icon{width:15px;height:15px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,#BF5AF2,#007AFF)}
.ai-badge-text{font-size:10px;font-weight:700;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.07em}
.ai-note{font-size:10px;color:rgba(255,255,255,.3);line-height:1.5;margin:6px 14px 0;padding:0 2px}

/* Live activity */
.live-act{background:rgba(255,255,255,.1);border-radius:18px;padding:14px 16px;margin:0 14px 12px;border:1px solid rgba(255,255,255,.08)}
.la-top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.la-logo{width:30px;height:30px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.la-ttl{font-size:13px;font-weight:700;color:#fff}
.la-sub{font-size:11px;color:rgba(255,255,255,.45)}
.la-live{margin-left:auto;background:rgba(249,99,2,.28);color:var(--orange);font-size:10px;font-weight:800;padding:3px 9px;border-radius:10px;letter-spacing:.04em}
.prog-steps{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-step{font-size:9px;color:rgba(255,255,255,.3);flex:1;text-align:center;font-weight:600}
.prog-step.done{color:var(--orange)}
.prog-step.cur{color:#fff}
.prog-track{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin-bottom:11px}
.prog-fill{height:100%;background:var(--orange);border-radius:2px}
.la-foot{display:flex;justify-content:space-between;align-items:center}
.la-eta-n{font-size:26px;font-weight:300;color:#fff;line-height:1}
.la-eta-u{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.la-eta-l{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.la-driver{font-size:13px;color:#fff;font-weight:600}

/* Contact card */
.cc{border:2px solid var(--orange);border-radius:13px;overflow:hidden;margin-bottom:10px}
.cc-head{background:var(--orange-light);padding:12px 14px;display:flex;align-items:center;gap:11px}
.cc-av{width:38px;height:38px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0}
.cc-name{font-size:14px;font-weight:700;color:var(--black)}
.cc-role{font-size:11px;color:var(--gray4);margin-top:1px}
.cc-badge{margin-left:auto;background:var(--green-bg);color:var(--green-text);font-size:10px;font-weight:800;padding:3px 8px;border-radius:10px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.cc-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.cc-acts{background:#fff;padding:9px 13px;display:flex;gap:7px}
.cc-act{flex:1;font-size:11px;font-weight:700;padding:8px 4px;border-radius:8px;text-align:center;border:1px solid var(--gray2);background:var(--gray1);color:var(--black);position:relative;z-index:950}
.cc-act.red{color:var(--orange-dark);border-color:var(--orange-mid);background:var(--orange-light)}

/* Progress tracker */
.tracker{display:flex;align-items:center;margin:14px 0 4px}
.tstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.tdot{width:22px;height:22px;border-radius:50%;border:2px solid var(--gray2);background:#fff;z-index:1;margin-bottom:5px;display:flex;align-items:center;justify-content:center}
.tdot.done{background:var(--orange);border-color:var(--orange)}
.tdot.cur{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,99,2,.18)}
.tcheck{display:none}
.tdot.done .tcheck{display:block}
.tline{position:absolute;top:10px;left:55%;right:-55%;height:2px;background:var(--gray2);z-index:0}
.tline.done{background:var(--orange)}
.tlbl{font-size:9px;color:var(--gray4);text-align:center;font-weight:500}
.tlbl.done{color:var(--orange-dark);font-weight:700}
.tlbl.cur{color:var(--black);font-weight:700}

/* Status pill */
.spill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:var(--orange-light);color:var(--orange-dark);margin-top:8px}
.spill-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 1.5s infinite}

/* Timeline */
.timeline{position:relative;padding-left:22px}
.tl-spine{position:absolute;left:7px;top:8px;bottom:0;width:1.5px;background:var(--gray2)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-18px;top:4px;width:11px;height:11px;border-radius:50%;border:2px solid var(--gray2);background:#fff}
.tl-dot.done{background:var(--orange);border-color:var(--orange)}
.tl-dot.cur{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,99,2,.18)}
.tl-time{font-size:10px;color:var(--gray4);margin-bottom:1px;font-weight:500}
.tl-text{font-size:13px;color:var(--black);font-weight:600;line-height:1.4}
.tl-sub{font-size:11px;color:var(--gray4);margin-top:2px}
.tl-chip{display:inline-block;margin-top:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--orange-light);color:var(--orange-dark)}
.tl-chip.g{background:var(--green-bg);color:var(--green-text)}
.tl-chip.gray{background:var(--gray1);color:var(--gray4)}

.hi{height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hi-bar{width:120px;height:4px;background:rgba(0,0,0,.18);border-radius:2px}
.hi-bar.w{background:rgba(255,255,255,.28)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Tap hint overlay */
#tap-hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;z-index:980;pointer-events:none;transition:opacity .5s;white-space:nowrap}
</style>
</head>
<body>

<div id="prog-bar"><div id="prog-fill"></div></div>
<div id="diWrap">
  <div class="di-pill closed" id="diPill" onclick="toggleDI(); event.stopPropagation();">
    <div class="di-closed-inner" id="diClosed">
      <div class="di-logo-circle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="14" rx="2" fill="white"/><path d="M8 6V5a2 2 0 012-2h4a2 2 0 012 2v1" stroke="white" stroke-width="1.5"/><path d="M12 11v4M10 13h4" stroke="#F96302" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="di-camera"></div>
      <div class="di-right">
        <div class="di-eta-n" id="diEtaN">4</div>
        <div class="di-eta-u">min</div>
      </div>
    </div>
    <div class="di-open-inner" id="diOpen">
      <div class="di-app-icon">&#127968;</div>
      <div class="di-open-text">
        <div class="di-open-title">HD delivery arriving</div>
        <div class="di-open-sub">Riverside Deck &bull; Carlos M.</div>
      </div>
      <div class="di-open-eta">
        <div class="di-open-num" id="diOpenN">4</div>
        <div class="di-open-lbl">min</div>
      </div>
    </div>
  </div>
  <div class="di-hint" id="diHint">tap to expand</div>
</div>

<div id="sw"></div>
<div id="tap-left" onclick="prev()"></div>
<div id="tap-right" onclick="next()"></div>
<div id="tap-hint">Tap right to advance &rarr;</div>

<script>
var cur = 0;
var diExpanded = false;
var diTimer = null;
var diEta = 4;
var hintShown = false;

var TOTAL = 7;

function pct(i) { return Math.round(((i+1)/TOTAL)*100)+'%'; }

var screens = [
  {
    di: false,
    html: function() {
      return '<div style="background:var(--gray1);min-height:100%;display:flex;flex-direction:column;">'
        +'<div class="sbar" style="background:#F96302;"><div class="sbar-time" style="color:#fff">9:41</div>'
        +'<div class="sbar-icons">'+sig('white')+wifi('white')+batt('white')+'</div></div>'
        +'<div class="nbar"><div class="nbar-back">&#8249; Orders</div><div class="nbar-title">Order confirmed</div><div class="nbar-badge">Pro</div></div>'
        +'<div class="content" style="padding-top:12px">'
        +'<div class="card"><div class="card-p"><div class="otitle">Riverside Deck</div><div class="osub">#HD-2026-88412 &nbsp;&bull;&nbsp; Est. delivery Thu Mar 5</div></div>'
        +'<div style="border-top:1px solid var(--gray1);padding:10px 14px">'
        +'<div class="irow"><div class="iicon">&#129683;</div><div><div class="iname">Pressure-treated 2x6x12</div><div class="isub">Qty 40 &bull; Job: Riverside Deck</div></div></div>'
        +'<div class="irow"><div class="iicon">&#128297;</div><div><div class="iname">Structural deck screws 5lb</div><div class="isub">Qty 4 &bull; Job: Riverside Deck</div></div></div>'
        +'</div></div>'
        +'<div class="slbl">Delivery contact</div>'
        +'<div class="delegate-box"><div class="delegate-lbl">'
        +'<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="3" stroke="#C45000" stroke-width="1.5"/><path d="M2 14.5c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#C45000" stroke-width="1.5" stroke-linecap="round"/></svg>'
        +'Who should receive delivery updates?</div>'
        +'<div class="mfield">Marcus Webb</div><div class="mfield" style="margin-bottom:12px">(407) 555-0183</div></div>'
        +'<div class="slbl">Order summary</div>'
        +'<div class="card"><div class="card-p">'

function ts(done,cur,lbl,line){
  var dc=done?'done':(cur?'cur':'');
  var lc=done?'done':(cur?'cur':'');
  var ck=done?'<svg class="tcheck" width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>':'';
  var ln=line?'<div class="tline '+(done?'done':'')+'"></div>':'';
  return '<div class="tstep"><div class="tdot '+dc+'">'+ck+'</div>'+ln+'<div class="tlbl '+lc+'">'+lbl+'</div></div>';
}
function tl(dc,time,text,sub,chip,cc){
  var ch=chip?'<span class="tl-chip '+cc+'">'+chip+'</span>':'';
  return '<div class="tl-item"><div class="tl-dot '+dc+'"></div><div class="tl-time">'+time+'</div><div class="tl-text">'+text+'</div><div class="tl-sub">'+sub+'</div>'+ch+'</div>';
}

function go(i) {
  if (i < 0 || i >= TOTAL) return;
  var sw = document.getElementById('sw');
  var old = sw.querySelector('.screen.active');
  var el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = screens[i].html();
  sw.appendChild(el);
  if (old) { old.classList.add('exit'); setTimeout(function(){ if(old.parentNode) old.parentNode.removeChild(old); }, 350); }
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('active'); }); });
  cur = i;
  document.getElementById('prog-fill').style.width = pct(i);
  var dw = document.getElementById('diWrap');
  if (screens[i].di) {
    dw.style.display = 'flex';
    diExpanded = false;
    resetDI();
  } else {
    dw.style.display = 'none';
  }
  if (!hintShown) {
    hintShown = true;
    setTimeout(function(){ document.getElementById('tap-hint').style.opacity = '0'; }, 3000);
  }
}

function next() { if (cur < TOTAL - 1) go(cur + 1); }
function prev() { if (cur > 0) go(cur - 1); }

function resetDI() {
  var pill = document.getElementById('diPill');
  var closed = document.getElementById('diClosed');
  var open = document.getElementById('diOpen');
  pill.className = 'di-pill closed';
  closed.classList.remove('fade');
  open.classList.remove('show');
  document.getElementById('diHint').style.opacity = '1';
  diEta = 4;
  document.getElementById('diEtaN').textContent = '4';
  document.getElementById('diOpenN').textContent = '4';
  clearInterval(diTimer);
  diTimer = setInterval(function() {
    diEta = Math.max(1, diEta - 1);
    var a = document.getElementById('diEtaN');
    var b = document.getElementById('diOpenN');
    var c = document.getElementById('diLiveNum');
    if (a) a.textContent = diEta;
    if (b) b.textContent = diEta;
    if (c) c.textContent = diEta;
  }, 7000);
}

function toggleDI() {
  var pill = document.getElementById('diPill');
  var closed = document.getElementById('diClosed');
  var open = document.getElementById('diOpen');
  var hint = document.getElementById('diHint');
  diExpanded = !diExpanded;
  if (diExpanded) {
    pill.className = 'di-pill open';
    closed.classList.add('fade');
    setTimeout(function(){ open.classList.add('show'); }, 150);
    hint.style.opacity = '0';
  } else {
    pill.className = 'di-pill closed';
    open.classList.remove('show');
    setTimeout(function(){ closed.classList.remove('fade'); }, 150);
  }
}

function showIOSPopup() {
  var el = document.getElementById('iosOverlay');
  if (el) el.style.display = 'flex';
}
function dismissPopup() {
  var el = document.getElementById('iosOverlay');
  if (el) el.style.display = 'none';
}
function enableAndAdvance() {
  var el = document.getElementById('iosOverlay');
  if (el) el.style.display = 'none';
  setTimeout(function(){ next(); }, 220);
}

// Swipe support
var touchStartX = 0;
document.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', function(e){
  var dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { if (dx < 0) next(); else prev(); }
}, {passive:true});

go(0);
