<title>HD Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#sw{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;transform:translateX(100%);transition:opacity .32s ease,transform .32s cubic-bezier(.25,.46,.45,.94);pointer-events:none}

.screen.exit{opacity:0;transform:translateX(-26%)}
#diWrap{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:950;display:none;flex-direction:column;align-items:center}
.di-pill{background:#000;cursor:pointer;transition:all .42s cubic-bezier(.34,1.56,.64,1);overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
.di-pill.closed{width:210px;height:34px;border-radius:17px}
.di-pill.open{width:270px;height:80px;border-radius:28px}

.dic.fade{opacity:0}

.dio.show{opacity:1}

.di-hint{font-size:11px;color:rgba(255,255,255,.35);margin-top:7px;white-space:nowrap;text-align:center;pointer-events:none;transition:opacity .3s}

.pt{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin-bottom:11px}
.pf{height:100%;background:#F96302;border-radius:2px}
.la-ft{display:flex;justify-content:space-between;align-items:center}
.la-en{font-size:26px;font-weight:300;color:#fff;line-height:1}
.la-eu{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.la-el{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}

.spill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:#FFF3EC;color:#C45000;margin-top:8px}

function go(i){
  if(i<0||i>=screens.length) return;
  var sw=S('sw');
  var old=sw.querySelector('.screen.active');
  var el=document.createElement('div');
  el.className='screen';
  el.innerHTML=screens[i]();
  sw.appendChild(el);
  if(old){old.classList.add('exit');setTimeout(function(){if(old.parentNode)old.parentNode.removeChild(old);},360);}
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('active');});});
  cur=i;
  var dw=S('diWrap');
  if(i===5){dw.style.display='flex';diExp=false;resetDI();}
  else{dw.style.display='none';}
}

function resetDI(){
  var pill=S('diPill'),c=S('diC'),o=S('diO');
  pill.className='di-pill closed';c.classList.remove('fade');o.classList.remove('show');
  S('diHint').style.opacity='1';
  diEta=4;S('diN').textContent='4';S('diON').textContent='4';
  clearInterval(diTimer);
  diTimer=setInterval(function(){
    diEta=Math.max(1,diEta-1);
    var a=S('diN'),b=S('diON');
    if(a)a.textContent=diEta;if(b)b.textContent=diEta;
  },7000);
}

function toggleDI(){
  var pill=S('diPill'),c=S('diC'),o=S('diO'),hint=S('diHint');
  diExp=!diExp;
  if(diExp){
    pill.className='di-pill open';c.classList.add('fade');
    setTimeout(function(){o.classList.add('show');},150);
    hint.style.opacity='0';
  } else {
    pill.className='di-pill closed';o.classList.remove('show');
    setTimeout(function(){c.classList.remove('fade');},150);
  }
}

function showIOS(){var el=S('iosOv');if(el)el.style.display='flex';}
function dismissIOS(){var el=S('iosOv');if(el)el.style.display='none';}
function enableIOS(){var el=S('iosOv');if(el)el.style.display='none';setTimeout(function(){go(3);},220);}
